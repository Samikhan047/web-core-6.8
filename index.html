<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CPS - Sidebar Menu</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
</head>
<body>
    <div class="page-content">
        <div class="demo-header">
            <button class="menu-trigger" onclick="toggleSidebar()">
                <i class="fas fa-bars"></i>
            </button>
            <div class="logo-text">CPS</div>
        </div>

        
    </div>

    <!-- Sidebar Overlay -->
    <div class="sidebar-overlay" onclick="toggleSidebar()"></div>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <!-- Sidebar Header -->
        <div class="sidebar-header">
            <button class="close-btn" onclick="toggleSidebar()">
                <i class="fas fa-times"></i>
            </button>
            <div class="sidebar-logo">CPS</div>
            <button class="search-btn">
                <i class="fas fa-search"></i>
            </button>
        </div>

        <!-- Sidebar Navigation -->
        <nav class="sidebar-nav">
            <div class="nav-section">
                <a href="#" class="nav-item active">Equipment repair</a>
            </div>

            <div class="nav-section">
                <a href="#" class="nav-item section-title">Services and solutions</a>
                <a href="#" class="nav-item">Corporate clients</a>
                <a href="#" class="nav-item">Equipment sellers</a>
                <a href="#" class="nav-item">Partners</a>
                <a href="#" class="nav-item">Manufacturers</a>
                <a href="#" class="nav-item">Our service centres</a>
                <a href="#" class="nav-item">Contacts</a>
            </div>
        </nav>

        <!-- Sidebar Footer -->
        <div class="sidebar-footer">
            <div class="contact-actions">
                <button class="contact-btn">
                    <i class="fas fa-phone-alt"></i>
                </button>
                <button class="contact-btn">
                    <i class="fas fa-comment-dots"></i>
                </button>
                <button class="contact-btn">
                    <i class="fas fa-user"></i>
                </button>
            </div>

            <div class="contact-info">
                <div class="contact-email">mail@cps.com</div>
                <div class="contact-phone">8 800 890 8900</div>
            </div>

            <div class="language-switcher">
                <a href="#" class="lang-btn">RU</a>
                <a href="#" class="lang-btn active">EN</a>
                <a href="#" class="lang-btn">CH</a>
            </div>
        </div>
    </aside>
</body>
</html>
